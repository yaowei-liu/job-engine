name: Deploy

on:
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            APP_DIR="${{ secrets.SERVER_PATH }}"
            BRANCH="main"

            cd "$APP_DIR"

            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi

            PORT="${PORT:-3030}"
            HEALTH_URL="${HEALTH_URL:-http://127.0.0.1:${PORT}/health}"

            git fetch --all
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            mkdir -p data
            docker compose up -d --build
            docker compose ps

            attempt=1
            max_attempts=20
            until curl --fail --silent --show-error "$HEALTH_URL" >/dev/null; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Health check failed after ${max_attempts} attempts: ${HEALTH_URL}" >&2
                exit 1
              fi
              attempt=$((attempt + 1))
              sleep 3
            done

            echo "Deploy healthy: ${HEALTH_URL}"
